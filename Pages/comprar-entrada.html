	<section class="encontrado">

			<div class="row" id="rows">

	<!-- Entradas generales -->
	<section class="encontrado">
		<div class="container-md" id="general-center">
			<div class="row" id="rows">
				<div class="col text-center" id="first-container">
					<div class="parte-sup text-start" id="sup">
						<label for="#" class="form-label mb-0" id="text-form">Tipo entrada</label>	
						<div class="col mt-3">
							<div class="form-check">
							<input class="form-check-input" type="radio" value="vip" name="unico" id="checkIndeterminateV">
							<label class="form-check-label" for="checkIndeterminateV">
								VIP
							</label>
						</div>
						<div class="form-check">
							<input class="form-check-input" type="radio" name="unico" name="unico" value="generica" id="checkIndeterminateG">
							<label class="form-check-label" for="checkIndeterminateG">
								Generica
							</label>
						</div>
					</div>
  			</div>
			</div>
		</div>
	</section>
	<!-- Cantidad de entradas -->
	<section class="encontrado">
		<div class="container-md" id="general-center">
			<div class="row" id="rows">
				<div class="col text-center" id="first-container">

						<label for="#" class="form-label mb-3" id="text-form">Cantidad de entradas</label>	
						<select class="form-select" aria-label="Default select example" id="selector">
							<option selected value="1">Una</option>
							<option value="2">Dos</option>
							<option value="3">Tres</option>
							<option value="4">Cuatro</option>
						</select>
					</div>
  			</div>
			</div>
		</div>
	</section>
	<!-- Realizar pago -->
	<section class="encontrado">
		<div class="container-md" id="general-center">
			<div class="row" id="rows">
				<div class="col text-center" id="first-container">
					<div class="parte-sup text-start" id="sup">
						<label for="producto" class="form-label" id="text-form">Realizar pago</label>
						<div class="input-group flex-nowrap" id="input-user">
							<span class="input-group-text" id="addon-wrapping">
								<i class="bi bi-person-fill" id="icon"></i>
							</span>
							<input id="producto" placeholder="Nombre del titular" type="text" class="form-control" aria-label="Username" aria-describedby="addon-wrapping">
						</div>
						<div class="parte-sup text-start mt-3" id="sup">	
							<select class="form-select" aria-label="Default select example" id="selector">
								<option value="0">Mes de vencimiento de la tarjeta</option>
								<option value="1">Enero</option>
								<option value="2">Febrero</option>
								<option value="3">Marzo</option>
								<option value="4">Abril</option>
								<option value="5">Mayo</option>
								<option value="6">Junio</option>
								<option value="7">Julio</option>
								<option value="8">Agosto</option>
								<option value="9">Septiembre</option>
								<option value="10">Octubre</option>
								<option value="11">Noviembre</option>
								<option value="12">Diciembre</option>
							</select>
						</div>	
						<div class="input-group flex-nowrap mt-3 id="input-user">
							<span class="input-group-text" id="addon-wrapping">
								<i class="bi bi-calendar3" id="icon"></i>
							</span>
							<input min="1" max="31" id="producto" placeholder="Dia de vencimiento de la tarjeta" type="number" class="form-control" aria-label="Username" aria-describedby="addon-wrapping">
						</div>
						<div class="input-group flex-nowrap mt-3 id="input-user">
							<span class="input-group-text" id="addon-wrapping">
								<i class="bi bi-credit-card-2-front" id="icon"></i>
							</span>
							<input id="producto" placeholder="Número de la tarjeta (14-16 digitos)" type="text" class="form-control" aria-label="Username" aria-describedby="addon-wrapping">
						</div>
						<div class="input-group flex-nowrap mt-3 id="input-user">
							<span class="input-group-text" id="addon-wrapping">
								<i class="bi bi-credit-card" id="icon"></i>
							</span>
							<input id="producto" placeholder="CVV (3-4 digitos)" type="text" class="form-control" aria-label="Username" aria-describedby="addon-wrapping">
						</div>	
						<div class="parte-sup text-start mt-3" id="sup">	
							<select class="form-select" aria-label="Default select example" id="selector">
								<option value="0">Tipo de tarjeta</option>
								<option value="1">Visa Credito</option>
								<option value="2">Visa< Debito</option>
								<option value="3">Mastercard Credito</option>
								<option value="4">Mastercard Debito</option>
								<option value="5">American Express Credito</option>
								<option value="6">American Express Debito</option>
							</select>
						</div>				
					</div>
  			</div>
			</div>
		</div>
	</section>
	<!-- Monto total -->
	<section class="encontrado">
		<div class="container-md" id="general-center">

							<div class="form-check text-start ps-0">
							<label class="form-check-label" for="checkIndeterminate" id="monto">

							</label>
						</div>
					</div>
  			</div>
			</div>
		</div>
